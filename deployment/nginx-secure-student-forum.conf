# HTTP — redirect all traffic to HTTPS
server {
    listen 80 default_server;
    server_name _;
    server_tokens off;

    return 301 https://$host$request_uri;
}

# HTTPS — main server block
server {
    listen 443 ssl default_server;
    server_name _;
    server_tokens off;

    client_max_body_size 1m;

    # Self-signed coursework certificate.
    # Replace with a CA-signed certificate for a public production service.
    ssl_certificate     /etc/nginx/ssl/secure-student-forum.crt;
    ssl_certificate_key /etc/nginx/ssl/secure-student-forum.key;

    # Permit only currently supported TLS protocol versions.
    ssl_protocols TLSv1.2 TLSv1.3;

    # Explicit TLS 1.2 cipher policy. TLS 1.3 cipher selection is handled
    # separately by OpenSSL using its secure defaults.
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";
    ssl_prefer_server_ciphers off;

    # Restrict key-exchange curves to modern choices.
    ssl_ecdh_curve X25519:prime256v1:secp384r1;

    # Shared session cache improves resumption without retaining static
    # session-ticket keys on this single-server coursework deployment.
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # TLS 1.3 early data remains disabled to avoid replay-sensitive requests.
    ssl_early_data off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    location /static/ {
        alias /opt/secure_student_forum/app/static/;
        expires 1h;
    }

    location / {
        # Nginx is the public security-header authority.
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Content-Security-Policy;

        proxy_pass http://unix:/run/secure-student-forum/forum.sock;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect off;
        proxy_buffering on;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}