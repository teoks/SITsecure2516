server {
    listen 80 default_server;
    server_name _;
    server_tokens off;

    client_max_body_size 1m;

    # Security headers applied at reverse proxy layer for production scanning.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    location /static/ {
        alias /opt/secure_student_forum/app/static/;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location / {
        proxy_pass http://unix:/run/secure-student-forum/forum.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering on;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
