# HTTP — redirect all traffic to HTTPS
server {
    listen 80 default_server;
    server_name _;
    server_tokens off;
    return 301 https://$host$request_uri;
}

# HTTPS — main server block
server {
    listen 443 ssl default_server;
    server_name _;
    server_tokens off;
    client_max_body_size 1m;

    # Self-signed cert (replace with CA-signed cert in production)
    ssl_certificate     /etc/nginx/ssl/secure-student-forum.crt;
    ssl_certificate_key /etc/nginx/ssl/secure-student-forum.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    location /static/ {
    alias /opt/secure_student_forum/app/static/;
    expires 1h;
    }

    location / {
    # Nginx is the public security-header authority.
    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Permissions-Policy;
    proxy_hide_header Content-Security-Policy;

    proxy_pass http://unix:/run/secure-student-forum/forum.sock;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_redirect off;
    proxy_buffering on;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    }
}
