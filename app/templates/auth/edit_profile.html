{% extends "base.html" %}
{% block title %}Edit Profile - Secure Student Forum{% endblock %}
{% block content %}
<section class="card narrow">
    <h1>Edit profile</h1>
    <form method="post" novalidate>
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" maxlength="255" required value="{{ current_user.email }}">
        <button type="submit">Save changes</button>
    </form>
</section>
{% endblock %}
