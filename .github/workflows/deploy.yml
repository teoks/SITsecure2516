name: Deploy Secure Student Forum to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "Starting deployment..."

            sudo chown -R student6:student6 /opt/secure_student_forum

            cd /opt/secure_student_forum

            git fetch origin main
            git reset --hard origin/main

            source .venv/bin/activate
            pip install -r requirements.txt

            sudo chown -R forumapp:forumapp /opt/secure_student_forum
            sudo chmod 600 /opt/secure_student_forum/.env

            sudo systemctl restart secure-student-forum

            sudo systemctl status secure-student-forum --no-pager

            echo "Deployment completed successfully."