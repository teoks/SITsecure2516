name: Secure Student Forum CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate Code and Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout validated commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install application dependencies
        run: pip install -r requirements.txt

      - name: Install test and security tools
        run: pip install -r requirements-dev.txt

      - name: Check .env is not tracked
        run: |
          if git ls-files | grep -Eq '(^|/)\.env$'; then
            echo "ERROR: .env is tracked by Git."
            exit 1
          fi
          echo ".env is not tracked."

      - name: Check sensitive key files are not tracked
        run: |
          if git ls-files | grep -Ei '(^|/)(.*\.pem|.*\.key|id_rsa|id_ed25519)$'; then
            echo "ERROR: sensitive key file is tracked by Git."
            exit 1
          fi
          echo "No private key files are tracked."

      - name: Python syntax check
        run: python -m compileall app wsgi.py

      - name: Run unit tests
        run: python -m pytest

      - name: Run Bandit static security scan
        run: python -m bandit -r app -ll -ii

      - name: Run dependency vulnerability scan
        run: python -m pip_audit -r requirements.txt

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@1e54355a8b4c8abaa8cc7d0b70aa655a3bb15a6c # main
        with:
          project: "SecureStudentForum"
          path: "."
          format: "HTML"
          out: "dependency-check-report"

      - name: Upload OWASP Dependency Check Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Dependency-Check-Report
          path: dependency-check-report

      - name: Run secret scan
        run: |
          python -m detect_secrets scan --all-files \
            --exclude-files "(\.venv|\.pytest_cache|__pycache__|instance|logs|backups)"

  selenium-test:
    name: Run Selenium UI Tests
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Initialise test database
        env:
          FLASK_ENV: testing
          SECRET_KEY: selenium-test-secret-key
          DATABASE_URL: sqlite:///selenium-test.db
          EMAIL_VERIFICATION_REQUIRED: "0"
          RATELIMIT_ENABLED: "0"
        run: python -m flask --app wsgi init-db

      - name: Start Flask app
        env:
          FLASK_ENV: testing
          SECRET_KEY: selenium-test-secret-key
          DATABASE_URL: sqlite:///selenium-test.db
          EMAIL_VERIFICATION_REQUIRED: "0"
          RATELIMIT_ENABLED: "0"
        run: |
          python run.py > flask.log 2>&1 &
          echo $! > flask.pid

          for i in {1..20}; do
            if curl -f http://127.0.0.1:5000/ > /dev/null 2>&1; then
              echo "Flask app is ready."
              exit 0
            fi

            echo "Waiting for Flask app... attempt $i"
            sleep 2
          done

          cat flask.log
          exit 1

      - name: Run Selenium tests
        env:
          RUN_SELENIUM: "1"
          TEST_BASE_URL: http://127.0.0.1:5000
        run: python -m pytest tests/test_selenium_ui.py -v

      - name: Upload Flask log if failed
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: flask-log
          path: flask.log

  deploy:
    name: Deploy to EC2
    needs:
      - validate
      - selenium-test
    runs-on: ubuntu-latest

    concurrency:
      group: secure-student-forum-production
      cancel-in-progress: false

    steps:
      - name: Deploy exact validated commit to EC2
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          fingerprint: ${{ secrets.EC2_HOST_FINGERPRINT }}
          script: |
            set -e

            echo "Validation passed."
            echo "Selenium UI tests passed."
            echo "Deploying commit ${{ github.sha }} to EC2."

            sudo /usr/local/sbin/deploy_secure_student_forum "${{ github.sha }}"

      - name: Verify public HTTPS deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -Eeuo pipefail

          HTTPS_URL="https://${EC2_HOST}/"

          echo "Checking public HTTPS endpoint."

          HTTP_STATUS="$(
            curl \
              --insecure \
              --silent \
              --show-error \
              --retry 5 \
              --retry-all-errors \
              --retry-delay 5 \
              --connect-timeout 10 \
              --max-time 30 \
              --output /tmp/forum-response.html \
              --write-out '%{http_code}' \
              "$HTTPS_URL"
          )"

          if [[ "$HTTP_STATUS" != "200" ]]; then
            echo "ERROR: Public HTTPS endpoint returned status $HTTP_STATUS."
            exit 1
          fi

          if ! grep -q "Secure Student Forum" /tmp/forum-response.html; then
            echo "ERROR: Expected application content was not found."
            exit 1
          fi

          HEADERS="$(
            curl \
              --insecure \
              --silent \
              --show-error \
              --head \
              "$HTTPS_URL"
          )"

          echo "$HEADERS" |
            grep -qi '^Strict-Transport-Security:.*max-age=' ||
            {
              echo "ERROR: Public response is missing HSTS."
              exit 1
            }

          echo "$HEADERS" |
            grep -qi '^Content-Security-Policy:' ||
            {
              echo "ERROR: Public response is missing CSP."
              exit 1
            }

          echo "$HEADERS" |
            grep -qi '^X-Content-Type-Options:[[:space:]]*nosniff' ||
            {
              echo "ERROR: Public response is missing X-Content-Type-Options."
              exit 1
            }

          echo "Public HTTPS smoke test passed."